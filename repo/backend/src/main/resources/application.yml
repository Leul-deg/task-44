server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/shiftworks?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:shiftworks}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  security:
    aes-secret-key: ${AES_SECRET_KEY}
    enforce-secret-policy: true
    password:
      min-length: 12
      rotation-days: 90
    captcha-after-failures: 3
    lock-after-failures: 5
    lock-duration-minutes: 15
  storage:
    file-path: ${FILE_STORAGE_PATH:/app/uploads}
    backup-path: ${BACKUP_PATH:/app/backups}
  session:
    idle-timeout-minutes: 30
    absolute-timeout-hours: 12
  rate-limit:
    per-minute: 60
    auth-per-minute: 20
  job-validation:
    validity-days:
      default-days: 30
      max: 90
    hourly-pay:
      min: 12
      max: 75
    flat-pay:
      min: 12
      max: 5000
    headcount:
      min: 1
      max: 500
    weekly-hours:
      min: 1
      max: 80
